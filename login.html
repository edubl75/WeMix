<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WeMix – Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
<a href="home.html" class="logo">
    WeMix
</a>

    <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="explorer.html">Explorar</a>
        <a href="prices.html">Precios</a>
        <a href="login.html" class="active">Login</a>
    </nav>
</header>

<main class="login-container">

    <div class="login-box">
        <h1>Iniciar sesión</h1>
        <p class="login-subtitle">
            Accede a tu cuenta de WeMix
        </p>

        <form class="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button type="button" class="btn-primary" id="loginBtn">Entrar</button>
        </form>

        <p class="login-footer">
            ¿No tienes cuenta?
            <a href="register.html">Crear cuenta</a>
        </p>
    </div>

</main>
<script src="script.js"></script>

</body>
</html>
