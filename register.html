<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>WeMix – Crear cuenta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
<a href="home.html" class="logo">
    WeMix
</a>

        <nav class="nav">
            <a href="index.html">Inicio</a>
            <a href="explore.html">Explorar</a>
            <a href="prices.html">Precios</a>
            <a href="login.html">Login</a>
        </nav>
    </header>


<!-- REGISTER -->
<main class="login-container">

    <div class="login-box">
        <h1>Crear cuenta</h1>
        <p class="login-subtitle">
            Descarga, crea y gana reputación dentro del ecosistema WeMix
        </p>

        <form class="login-form">

            <div class="form-group">
                <label>Nombre de DJ</label>
                <input type="text" id="djName" placeholder="DJ Pulse">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="tu@email.com">
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>

            <div class="form-terms">
                <label class="checkbox">
                    <input type="checkbox" id="termsCheck">
                    <span>
                        Confirmo que subiré contenido propio o autorizado y acepto
                        las <a href="#">normas de WeMix</a>.
                    </span>
                </label>
            </div>

            <!-- IMPORTANTE: type="button" -->
            <button type="button" class="btn-primary" id="registerBtn">
                Crear cuenta
            </button>

        </form>

        <div class="login-footer">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
        </div>
    </div>

</main>
    
<script src="script.js"></script>

</body>
</html>
